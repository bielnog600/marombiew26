<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MAROMBIEW</title>
    <meta name="description" content="Treino e dieta personalizada">
    <meta name="author" content="MAROMBIEW" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0F1115" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MAROMBIEW" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preload splash logo so it appears instantly, even offline (cached by SW) -->
    <link rel="preload" as="image" href="/splash-logo.webp" type="image/webp" fetchpriority="high" />

    <!-- Inline critical styles: prevents white flash before CSS/JS load on slow connections -->
    <style>
      html, body { background-color: #0F1115 !important; margin: 0; padding: 0; }
      html { color-scheme: dark; }
      #root { background-color: #0F1115; min-height: 100vh; }
      #boot-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background-color: #0F1115;
      }
      #boot-splash img {
        width: 154px; height: 154px; border-radius: 16px;
        animation: boot-pop 0.7s ease-out;
      }
      @keyframes boot-pop {
        0% { opacity: 0; transform: scale(0.6); }
        60% { opacity: 1; transform: scale(1.08); }
        100% { opacity: 1; transform: scale(1); }
      }
    </style>

    <!-- OG Tags -->
    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZKFdTot101cDpik2NVU6w54XJb22/social-images/social-1772224538718-logo_marombiew.webp">
    <meta name="twitter:card" content="summary_large_image" />
    
    
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZKFdTot101cDpik2NVU6w54XJb22/social-images/social-1772224538718-logo_marombiew.webp">
    <meta property="og:title" content="MAROMBIEW">
  <meta name="twitter:title" content="MAROMBIEW">
  <meta property="og:description" content="Treino e dieta personalizada">
  <meta name="twitter:description" content="Treino e dieta personalizada">
</head>

  <body>
    <div id="boot-splash"><img src="/splash-logo.webp" alt="MAROMBIEW" /></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
