<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
     <meta name="screen-orientation" content="portrait">
     <meta name="x5-orientation" content="portrait">
    <title>MAROMBIEW</title>
    <meta name="description" content="Treino e dieta personalizada">
    <meta name="author" content="MAROMBIEW" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0F1115" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MAROMBIEW" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preload splash logo so it appears instantly, even offline (cached by SW) -->
    <link rel="preload" as="image" href="/splash-logo.webp" type="image/webp" fetchpriority="high" />

    <!-- Inline critical styles: prevents white flash before CSS/JS load on slow connections -->
    <style>
      html, body { background-color: #0F1115 !important; margin: 0; padding: 0; overscroll-behavior: none !important; }
      html { color-scheme: dark; }
      #root { background-color: #0F1115; min-height: 100vh; }
      #boot-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column;
        background-color: #0F1115;
        opacity: 1;
        transform: translateZ(0);
        backface-visibility: hidden;
      }
      #boot-splash .boot-logo-wrap {
        position: relative;
        width: 170px; height: 170px;
        opacity: 0;
        transform: scale(0.96) translateZ(0);
        animation: boot-enter 280ms ease-out forwards;
        transform-origin: center;
      }
      #boot-splash svg {
        position: absolute; inset: 0;
        animation: boot-spin 1.2s linear infinite;
      }
      #boot-splash img {
        position: absolute; inset: 0; margin: auto;
        width: 154px; height: 154px; border-radius: 16px;
      }
      #boot-splash [data-splash-update-status] {
        position: absolute;
        left: 24px;
        right: 24px;
        top: calc(50% + 118px);
        margin: 0;
        text-align: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0;
        color: #FFC400;
        opacity: 0.78;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes boot-enter {
        from { opacity: 0; transform: scale(0.96) translateZ(0); }
        to { opacity: 1; transform: scale(1) translateZ(0); }
      }
      #boot-splash.boot-leaving {
        opacity: 0;
        transition: opacity 320ms ease-in;
      }
    </style>

    <!-- OG Tags -->
    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZKFdTot101cDpik2NVU6w54XJb22/social-images/social-1772224538718-logo_marombiew.webp">
    <meta name="twitter:card" content="summary_large_image" />
    
    
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZKFdTot101cDpik2NVU6w54XJb22/social-images/social-1772224538718-logo_marombiew.webp">
    <meta property="og:title" content="MAROMBIEW">
  <meta name="twitter:title" content="MAROMBIEW">
  <meta property="og:description" content="Treino e dieta personalizada">
  <meta name="twitter:description" content="Treino e dieta personalizada">
</head>

  <body>
    <div id="boot-splash">
      <script>if(sessionStorage.getItem('_splashDone')){document.getElementById('boot-splash').style.display='none'}</script>
      <div class="boot-logo-wrap">
        <svg width="170" height="170" viewBox="0 0 170 170" aria-hidden="true">
          <circle cx="85" cy="85" r="83" stroke="#171A21" stroke-width="4" fill="none" opacity="0.45" />
          <circle cx="85" cy="85" r="83" stroke="#FFC400" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="130 391" />
        </svg>
        <img src="/splash-logo.webp" alt="MAROMBIEW" />
      </div>
      <p data-splash-update-status="true">Carregando...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
